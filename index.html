<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>re01</title>
    <style>
        .box01 {
    box-sizing: border-box;
    width: 200px;
    height: 100px;
    box-shadow: rgba(158, 88, 67, 0.3);
    background: linear-gradient(45deg, rgba(255,0,127), rgba(255, 0, 255));
    margin-top: 80px;
    margin-left: 500px;
    padding-top: 2px;
    padding-left: 30px;
    padding-right: 30px;
    border-radius: 30px;
    color: rgba(23, 55, 165, 0.4);
    font-size: 20px;
    font-weight: 500;
    line-height: 1.6;
    letter-spacing: 6px;
    transition:
                transform 1s,
                box-shadow 1s,
                background-color 1s,
                color 1s;
}

.box01:hover {
    background: linear-gradient(90deg, rgba(55, 32, 91, 0.6), rgba(87, 22, 63, 0.2));

    transform: scale(1.2) rotate(720deg) translateX(30px) translateY(30px) translateZ(60px);

    
};
    </style>
</head>
<body>
    <h1>55688</h1>
    <a href="https://classhuangwenyang02020803-bit.github.io/20260214/"><div class="box01">
        <p>Valentine 's Day</p>
    </div></a>
    <!--
    --soft - 指定版本後的變更再暫存區，剩下commit
    
    --mixde(可不填) - 指定版本後的變更在工作目錄區，接續 add + commit
    
    --hard - -指定版本後的變更都刪除
    
    -->
</body>
</html>
